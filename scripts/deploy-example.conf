# TunnelBypass Deployment Configuration
# Source this file to set environment variables for deployment
#
# Usage:
#   source deploy-example.conf
#   ./deploy.sh -H $DEPLOY_HOST -u $DEPLOY_USER -i $DEPLOY_KEY

# Target server
export DEPLOY_HOST="your-server.com"
export DEPLOY_PORT="22"
export DEPLOY_USER="root"

# Authentication (choose one)
export DEPLOY_KEY="$HOME/.ssh/id_rsa"
# export DEPLOY_PASS="your-password-here"  # Not recommended

# Version (optional - auto-detected if not set)
# export DEPLOY_VERSION="v1.2.1"

# Release directory (optional)
export DEPLOY_RELEASE_DIR="../"

# Options
export DEPLOY_TIMEOUT="30"

# Example usage after sourcing:
# ./deploy.sh -H $DEPLOY_HOST -u $DEPLOY_USER -i $DEPLOY_KEY
